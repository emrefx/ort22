<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Ortaklar İzolasyon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #030811; color: white; }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .text-glow { text-shadow: 0 0 10px rgba(74, 222, 255, 0.5); color: #4adeff; }
    </style>
</head>
<body class="py-20 px-6">
    <div class="container mx-auto">
        <div class="grid md:grid-cols-2 gap-16">
            <div>
                <h1 class="text-4xl font-black mb-6 text-glow underline decoration-white/10">BİZE ULAŞIN</h1>
                <p class="text-white/60 mb-10">Ücretsiz keşif ve fiyat teklifi için form doldurabilir veya doğrudan arayabilirsiniz.</p>
                
                <div class="space-y-8">
                    <div class="flex items-start gap-4">
                        <span class="text-2xl">📍</span>
                        <div>
                            <h4 class="font-bold">Adres</h4>
                            <p class="text-white/50">Havacılar Cd. No:22/M Gaziemir / İZMİR</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4">
                        <span class="text-2xl">📞</span>
                        <div>
                            <h4 class="font-bold">Telefon</h4>
                            <p class="text-white/50">0536 037 8583</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white/5 p-8 rounded-3xl border border-white/10">
                <form action="#" class="space-y-4">
                    <input type="text" placeholder="Adınız Soyadınız" class="w-full p-4 rounded-xl focus:outline-none focus:border-cyan-500">
                    <input type="tel" placeholder="Telefon Numaranız" class="w-full p-4 rounded-xl focus:outline-none focus:border-cyan-500">
                    <select class="w-full p-4 rounded-xl focus:outline-none focus:border-cyan-500">
                        <option>Hizmet Seçin</option>
                        <option>Bohçalama</option>
                        <option>Epoksi</option>
                        <option>Çatı İşleri</option>
                    </select>
                    <textarea placeholder="Mesajınız" rows="4" class="w-full p-4 rounded-xl focus:outline-none focus:border-cyan-500"></textarea>
                    <button class="w-full bg-cyan-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-cyan-500 transition">TEKLİF İSTE</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
